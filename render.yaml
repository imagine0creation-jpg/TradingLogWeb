services:
  - type: web
    name: tradinglogweb-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: ALLOWED_ORIGINS
        value: https://imagine0creation-jpg.github.io
